apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-ingress
spec:
  ingressClassName: azure-application-gateway
  rules:
    - http:
        paths:
          - path: /api/*
            pathType: Prefix
            backend:
              service:
                name: weather-backend-service
                port:
                  number: 80
          - path: /*
            pathType: Prefix
            backend:
              service:
                name: weather-frontend-service
                port:
                  number: 80
